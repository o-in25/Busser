<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<title>Busser — Offline</title>

		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />

		<link rel="icon" href="/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			*, *::before, *::after {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			/* light background */
			body {
				font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
				min-height: 100dvh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 0.5rem;
				background:
					radial-gradient(ellipse 80% 50% at 20% 40%, rgba(253, 111, 148, 0.12) 0%, transparent 50%),
					radial-gradient(ellipse 60% 40% at 80% 20%, rgba(165, 125, 213, 0.1) 0%, transparent 50%),
					radial-gradient(ellipse 50% 50% at 50% 80%, rgba(253, 111, 148, 0.08) 0%, transparent 50%),
					#fafafa;
				color: hsl(240, 10%, 3.9%);
			}

			/* dark background */
			.dark body {
				background:
					radial-gradient(ellipse 80% 50% at 20% 40%, rgba(193, 15, 80, 0.15) 0%, transparent 50%),
					radial-gradient(ellipse 60% 40% at 80% 20%, rgba(111, 65, 150, 0.12) 0%, transparent 50%),
					radial-gradient(ellipse 50% 50% at 50% 80%, rgba(193, 15, 80, 0.1) 0%, transparent 50%),
					#0a0a0a;
				color: hsl(0, 0%, 98%);
			}

			.logo {
				height: 6rem;
				margin-bottom: 0;
			}
			@media (min-width: 768px) {
				.logo { height: 8rem; }
			}

			.logo-link {
				transition: opacity 0.2s;
				text-decoration: none;
			}
			.logo-link:hover { opacity: 0.8; }

			/* light glass card */
			.card {
				width: 100%;
				max-width: 28rem;
				padding: 1.5rem;
				border-radius: 1rem;
				backdrop-filter: blur(24px);
				-webkit-backdrop-filter: blur(24px);
				background: rgba(255, 255, 255, 0.65);
				border: 1px solid rgba(255, 255, 255, 0.2);
				box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
			}

			/* dark glass card */
			.dark .card {
				background: rgba(39, 39, 42, 0.45);
				border: 1px solid rgba(63, 63, 70, 0.3);
				box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
			}

			@media (min-width: 768px) {
				.card { padding: 1.5rem; }
			}

			.card-content {
				display: flex;
				flex-direction: column;
				gap: 1rem;
			}

			h3 {
				font-size: 1.25rem;
				font-weight: 500;
				line-height: 1.75rem;
			}

			.message {
				font-size: 0.875rem;
				line-height: 1.5;
				color: hsl(240, 3.8%, 46.1%);
			}
			.dark .message {
				color: hsl(240, 5%, 64.9%);
			}

			.retry {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				width: 100%;
				height: 2.5rem;
				padding: 0 1rem;
				border-radius: 0.5rem;
				font-size: 0.875rem;
				font-weight: 500;
				text-decoration: none;
				border: none;
				cursor: pointer;
				transition: background-color 0.15s;
				background: hsl(340, 82%, 50%);
				color: hsl(0, 0%, 98%);
			}
			.dark .retry {
				background: hsl(340, 87%, 60%);
				color: hsl(0, 0%, 98%);
			}
			.retry:hover {
				opacity: 0.9;
			}

			.home-link {
				display: block;
				text-align: center;
				margin-top: 0.25rem;
				font-size: 0.875rem;
				color: hsl(240, 3.8%, 46.1%);
				text-decoration: none;
				transition: color 0.15s;
			}
			.dark .home-link {
				color: hsl(240, 5%, 64.9%);
			}
			.home-link:hover {
				color: hsl(340, 82%, 50%);
			}
			.dark .home-link:hover {
				color: hsl(340, 87%, 60%);
			}
		</style>
		<script>
			if (localStorage.getItem('color-theme')) {
				localStorage.getItem('color-theme') === 'dark'
					? document.documentElement.classList.add('dark')
					: document.documentElement.classList.remove('dark');
			} else {
				if (window.matchMedia('(prefers-color-scheme: light)').matches)
					document.documentElement.classList.remove('dark');
			}
		</script>
	</head>
	<body>
		<a href="/" class="logo-link">
			<img src="/favicon.png" alt="Busser" class="logo" />
		</a>

		<div class="card">
			<div class="card-content">
				<h3>You're offline</h3>
				<p class="message">
					It looks like you've lost your connection. Check your network and try again
					&mdash; your bar will be here when you're back.
				</p>
				<button class="retry" onclick="location.reload()">Retry</button>
				<a href="/" class="home-link">Go to homepage</a>
			</div>
		</div>
	</body>
</html>
